<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İtiraz Dilekçesi</title>
    <style>
        @page {
            size: A4;
            margin: 2.5cm 2.5cm 2.5cm 3cm; /* YUKARI, SAĞ, AŞAĞI, SOL - Sol margin dosya teli için geniş */
            
            @bottom-center {
                content: "Bu dilekçe CezaSavun.ai yapay zeka altyapısı ile referans amaçlı oluşturulmuştur.";
                font-family: 'Times New Roman', Times, serif;
                font-style: italic;
                font-size: 8pt;
                color: #7f8c8d;
            }
            
            @bottom-right {
                content: "Sayfa " counter(page) "/" counter(pages);
                font-family: 'Times New Roman', Times, serif;
                font-size: 9pt;
                color: #7f8c8d;
            }

            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800"><text x="400" y="400" transform="rotate(-45 400 400)" text-anchor="middle" font-family="Arial" font-size="60" font-weight="bold" fill="%23e0e0e0" opacity="0.3">CezaSavun.AI</text></svg>');
            background-position: center;
            background-repeat: no-repeat;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            line-height: 1.5; /* Resmi evrak standardı */
            color: #000000;
        }

        /* Başlıklar */
        h1, h2, h3, h4 {
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 24pt;
            margin-bottom: 12pt;
            page-break-after: avoid;
            font-size: 12pt; /* Mahkeme dilekçesinde başlıklar genelde çok büyük olmaz */
        }

        /* Standart Paragraflar */
        p {
            text-align: justify;
            text-indent: 1.25cm; /* İlk satır girintisi */
            margin-top: 0;
            margin-bottom: 12pt;
            orphans: 3;
            widows: 3;
        }

        /* Listeler (Açıklama maddeleri) */
        ul, ol {
            text-align: justify;
            margin-top: 0;
            margin-bottom: 12pt;
            padding-left: 1.25cm;
        }

        li {
            margin-bottom: 6pt;
        }

        /* Bold metinler (İTİRAZ EDEN: gibi kısımlar) */
        strong, b {
            font-weight: bold;
        }

        /* Tarih ve İmza Bloğu */
        .header-date {
            text-align: right;
            margin-bottom: 24pt;
        }

        .signature-block {
            margin-top: 48pt;
            float: right;
            text-align: center;
            width: 6cm;
            page-break-inside: avoid;
        }

        .signature-name {
            font-weight: bold;
            margin-bottom: 40pt; /* İmza için boşluk */
            border-bottom: 1px dotted #000;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

    <div class="header-date">{{ current_date }}</div>

    <!-- Markdown'dan çevrilen ham HTML içeriği buraya basılacak -->
    <div class="markdown-content">
        {{ content | safe }}
    </div>

    <div class="signature-block">
        <div class="signature-name">{{ client_name or '_______________________' }}</div>
        <div>(İmza)</div>
    </div>

    <div class="clearfix"></div>

</body>
</html>
