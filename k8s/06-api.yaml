# ==============================================================================
# KUBERNETES ÖĞRETİCİSİ - DERS 6: FASTAPI DEPLOYMENT VE NODEPORT SERVICE
# Öğretmen Notu: Burası projemizin (Uygulamanın) asıl kalbidir. 
# Kullanıcıların sisteme erişmesi için bir dış ağ geçidine (NodePort) ve 
# isteklere cevap verecek bir Pod sürüsüne (Deployment) ihtiyacımız var.
# ==============================================================================

# --- 1. Servis (Dışa Açılan Kapı) ---
apiVersion: v1
kind: Service
metadata:
  name: api-service # K8s içindeki adımız
spec:
  # Docker Desktop K8s'te "LoadBalancer" kullanırsak doğrudan localhost'a bağlanır!
  type: LoadBalancer 
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8000 # K8s içindeki Pod'ların iletişim kurduğu port
      targetPort: 8000 # Bizim FastAPI uygulamamızın (uvicorn) dinlediği port

---

# --- 2. Deployment (Uygulama Kopyaları) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  # Kullanıcı sayısı artarsa bu sayıyı 5, 10, 50 yapıp trafiği dağıtabiliriz! (Ölçekleme)
  replicas: 1 
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: traffic-defense-api
          # Docker Desktop'ın kendi içindeki imajımızı kullanacağız.
          # Adım 3'te terminalden oluşturacağımız imajın adıdır:
          image: iamseyhmus7/traffic-defense-api:latest 
          
          # Eğer lokal imaj kullanıyorsak "Never" veya "IfNotPresent" yapmalıyız.
          # Aksi halde K8s gidip internetten (Docker Hub'dan) bulmaya çalışır ve HATA verir!
          imagePullPolicy: IfNotPresent 
          
          ports:
            - containerPort: 8000
          
          # HARİKA BİR K8S ÖZELLİĞİ: "envFrom"
          # Tek tek yazmak yerine, ConfigMap ve Secret'teki tüm anahtarları
          # tek bir komutla bu konteynere zerk ediyoruz (enjekte ediyoruz)!
          envFrom:
            - configMapRef:
                name: tf-config # 1. Dersteki açık değişkenler
            - secretRef:
                name: tf-secrets # 2. Dersteki gizli şifreler
          
          # Öğretmen Notu: Sistemimizin PDF üretebilmesi için geçici bir
          # dosya alanına ihtiyacı var. Kalıcı olmasına gerek yok.
          volumeMounts:
            - name: uploads-dir
              mountPath: /app/uploads
      
      # emptyDir: Sadece Pod yaşadığı sürece var olan geçici bir K8s klasörüdür.
      volumes:
        - name: uploads-dir
          emptyDir: {}
