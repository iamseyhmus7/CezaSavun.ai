[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short -p no:warnings
# Tüm asenkron fixture'lar ve testler için varsayılan loop kapsamı
asyncio_default_fixture_loop_scope = function
markers =
    enable_limiter: Rate limiter'ı bu test için aktif hale getirir.
