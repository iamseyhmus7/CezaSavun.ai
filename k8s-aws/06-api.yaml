apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: cezasavun
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: traffic-defense-api
          image: seyhmusok/traffic-defense-api:latest 
          imagePullPolicy: Always  
          ports:
            - containerPort: 8000
          env:
            # Hatalı IRSA değişkenlerini zorla eziyoruz
            - name: AWS_ROLE_ARN
              value: ""
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: ""
            # Anahtarları doğrudan Secret'tan çekip buraya mühürlüyoruz
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tf-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tf-secrets
                  key: AWS_SECRET_ACCESS_KEY
          envFrom:
            - configMapRef:
                name: tf-config
            - secretRef:
                name: tf-secrets
          volumeMounts:
            - name: temp-storage
              mountPath: /app/uploads
      volumes:
        - name: temp-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: cezasavun
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
