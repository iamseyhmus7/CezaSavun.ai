services:
  api:
    build: .
    container_name: traffic_defense_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - tf_network

  celery_worker:
    build: .
    container_name: traffic_defense_celery
    command: celery -A app.core.celery_app worker --loglevel=info -P solo
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - tf_network

  celery_beat:
    build: .
    container_name: traffic_defense_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - tf_network

  db:
    image: postgres:15-alpine
    container_name: traffic_defense_db
    environment:
      POSTGRES_USER: ceza_admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: traffic_defense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceza_admin -d traffic_defense"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tf_network

  redis:
    image: redis:7-alpine
    container_name: traffic_defense_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - tf_network

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: traffic_defense_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - tf_network

volumes:
  redisdata:
  qdrant_data:
  postgres_data:


networks:
  tf_network:
    driver: bridge
