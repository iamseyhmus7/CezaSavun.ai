name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CEZASAVUNAI_ICIN_DOCKERHUB_USERNAME }}
          password: ${{ secrets.CEZASAVUNAI_ICIN_DOCKERHUB_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.CEZASAVUNAI_ICIN_DOCKERHUB_USERNAME }}/traffic-defense-api:latest
            ${{ secrets.CEZASAVUNAI_ICIN_DOCKERHUB_USERNAME }}/traffic-defense-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
