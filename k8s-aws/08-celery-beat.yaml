apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: cezasavun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: seyhmusok/traffic-defense-api:latest
          command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: tf-config
            - secretRef:
                name: tf-secrets
          volumeMounts:
            - name: temp-storage
              mountPath: /app/uploads
      volumes:
        - name: temp-storage
          emptyDir: {}
