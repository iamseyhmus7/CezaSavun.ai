
services:
  api:
    build: .
    container_name: traffic_defense_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_started
    networks:
      - tf_network


  redis:
    image: redis:7-alpine
    container_name: traffic_defense_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - tf_network

volumes:
  redisdata:

networks:
  tf_network:
    driver: bridge
